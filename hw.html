<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<script>
let userProfile = {
    username: "CoolUser99",
    bio: "  I LOVE coding! JavaScript is Great!!!  "
};

function cleanUserBio(profile) {

    var trimmed = profile.bio.trim();
    var low = profile.username.trim().toLowerCase();
    var low2 = trimmed.toLowerCase();
    var re = low2.replace(/javascript/g, "JS");
    var len = re.length;

    return {
        username: low,
        bio: re,
        bioLength: len
    };
}

let result = cleanUserBio(userProfile);
console.log(result);
</script>

</body>
</html>
